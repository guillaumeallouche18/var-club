<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAR CLUB – Duel VAR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pitch:#0a1a0f;
  --pitch2:#0f2416;
  --pitch3:#162e1c;
  --grass:#2d7a3a;
  --grass2:#3a9e4a;
  --lime:#a8e63d;
  --white:#f0f4e8;
  --cream:#d4e8c2;
  --amber:#f5c842;
  --red:#e8342a;
  --slate:#6b8f72;
  --r:10px;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scanDown{0%{top:0;opacity:1}100%{top:100%;opacity:0}}
@keyframes tagIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:.97}94%{opacity:.85}96%{opacity:.97}}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(168,230,61,.2)}50%{box-shadow:0 0 40px rgba(168,230,61,.45)}}

html,body{
  background:var(--pitch);color:var(--white);
  font-family:'Barlow Condensed',sans-serif;min-height:100vh;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(45,122,58,.04) 40px,rgba(45,122,58,.04) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(45,122,58,.03) 40px,rgba(45,122,58,.03) 41px);
}

.topbar{background:rgba(10,26,15,.95);border-bottom:3px solid var(--grass);padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);box-shadow:0 4px 32px rgba(45,122,58,.2);}
.brand{display:flex;align-items:center;gap:14px;}
.brand-name{font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:5px;color:var(--white);line-height:1;text-shadow:0 0 20px rgba(168,230,61,.3);animation:flicker 8s ease infinite;}
.brand-pipe{width:3px;height:28px;background:var(--grass2);border-radius:2px;}
.mode-label{font-size:11px;font-weight:800;letter-spacing:4px;color:var(--lime);text-transform:uppercase;}
.topbar-mid{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:700;color:rgba(240,244,232,.35);}
.topbar-mid .hl{color:var(--lime);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.live-pill{display:flex;align-items:center;gap:7px;background:var(--red);padding:5px 14px;border-radius:4px;font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:3px;box-shadow:0 0 12px rgba(232,52,42,.5);}
.live-dot{width:6px;height:6px;background:#fff;border-radius:50%;animation:blink 1s infinite;}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid rgba(168,230,61,.15);border-top-color:var(--lime);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{font-size:12px;font-weight:700;letter-spacing:3px;color:var(--slate);text-transform:uppercase;}
.error-banner{background:rgba(232,52,42,.1);border:1px solid rgba(232,52,42,.3);border-radius:var(--r);padding:14px 18px;margin:16px 0;font-size:13px;font-weight:600;color:var(--red);}

.page{max-width:1060px;margin:0 auto;padding:28px 20px 80px;}

/* STEPS */
.stepbar{display:flex;align-items:center;margin-bottom:28px;background:var(--pitch2);border-radius:var(--r);border:1px solid rgba(45,122,58,.2);overflow:hidden;animation:fadeUp .4s ease both;}
.step-item{flex:1;display:flex;align-items:center;gap:9px;padding:13px 18px;font-size:12px;font-weight:800;letter-spacing:1px;color:var(--slate);border-right:1px solid rgba(45,122,58,.15);transition:all .25s;}
.step-item:last-child{border-right:none;}
.step-item.on{color:var(--lime);background:rgba(168,230,61,.06);}
.step-item.done{color:var(--grass2);}
.step-num{width:24px;height:24px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.step-item.on .step-num{background:var(--lime);border-color:var(--lime);color:var(--pitch);}
.step-item.done .step-num{background:var(--grass2);border-color:var(--grass2);color:var(--pitch);}
.step-reset{margin-left:auto;padding-right:14px;}
.reset-btn{background:none;border:none;font-size:11px;font-weight:700;color:var(--slate);cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:color .15s;}
.reset-btn:hover{color:var(--red);}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px;}
@media(max-width:680px){.two-col{grid-template-columns:1fr;}}

.sh{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sh-num{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--lime);line-height:1;}
.sh-label{font-size:10px;font-weight:800;letter-spacing:3px;color:var(--slate);text-transform:uppercase;}

/* PICKER */
.picker-box{background:var(--pitch2);border:1.5px solid rgba(45,122,58,.25);border-radius:var(--r);animation:fadeUp .45s ease both;}
.picker-inner{padding:14px;}
.search-wrap{position:relative;}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--slate);pointer-events:none;}
.search-inp{width:100%;background:rgba(255,255,255,.04);border:1.5px solid rgba(45,122,58,.2);border-radius:6px;padding:10px 12px 10px 32px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--white);outline:none;transition:border-color .2s,box-shadow .2s;}
.search-inp:focus{border-color:var(--lime);box-shadow:0 0 0 3px rgba(168,230,61,.1);}
.search-inp::placeholder{color:var(--slate);}
.dropdown{position:absolute;top:calc(100%+4px);left:0;right:0;background:#0c1f11;border:1.5px solid rgba(45,122,58,.35);border-radius:var(--r);max-height:260px;overflow-y:auto;z-index:300;box-shadow:0 20px 50px rgba(0,0,0,.7);}
.dropdown::-webkit-scrollbar{width:3px;}
.dropdown::-webkit-scrollbar-thumb{background:var(--grass);border-radius:3px;}
.dg-label{padding:6px 12px 3px;font-size:9px;font-weight:800;letter-spacing:2px;color:var(--grass2);text-transform:uppercase;border-bottom:1px solid rgba(45,122,58,.12);}
.di{padding:9px 12px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(45,122,58,.07);transition:background .1s;}
.di:hover,.di.sel{background:rgba(168,230,61,.08);color:var(--lime);}
.di .has-data{font-size:8px;font-weight:800;color:var(--lime);background:rgba(168,230,61,.1);border:1px solid rgba(168,230,61,.2);padding:2px 6px;border-radius:3px;margin-left:auto;}
.di .no-data{font-size:8px;color:var(--slate);margin-left:auto;opacity:.5;}

.club-chip{margin-top:10px;display:flex;align-items:center;gap:10px;background:rgba(168,230,61,.06);border:1.5px solid rgba(168,230,61,.2);border-radius:8px;padding:11px 14px;animation:fadeUp .2s ease both;}
.chip-flag{font-size:20px;}
.chip-info{flex:1;}
.chip-name{font-size:16px;font-weight:800;color:var(--lime);}
.chip-league{font-size:10px;color:var(--slate);font-weight:600;margin-top:1px;}
.chip-x{cursor:pointer;color:var(--slate);font-size:16px;transition:color .15s;}
.chip-x:hover{color:var(--red);}

/* STATUS */
.status-box{background:var(--pitch2);border:1.5px solid rgba(45,122,58,.2);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;justify-content:center;min-height:130px;animation:fadeUp .45s ease both;}
.status-idle{font-size:13px;color:var(--slate);font-weight:600;line-height:1.7;}
.status-club-name{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:2px;color:var(--white);margin-bottom:2px;}
.status-q-text{font-size:14px;font-weight:700;color:var(--lime);margin-bottom:12px;letter-spacing:.3px;}
.btn-launch{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:6px;border:none;font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .18s;background:linear-gradient(135deg,var(--grass),var(--lime));color:var(--pitch);box-shadow:0 4px 20px rgba(168,230,61,.3);animation:pulse 3s ease infinite;}
.btn-launch:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(168,230,61,.45);}
.btn-launch:disabled{background:rgba(255,255,255,.08);color:var(--slate);box-shadow:none;animation:none;cursor:not-allowed;}
.btn-ghost{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:6px;font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .18s;background:transparent;border:1.5px solid rgba(45,122,58,.3);color:var(--slate);}
.btn-ghost:hover{border-color:var(--lime);color:var(--lime);}

/* QUESTIONS */
.q-section{animation:fadeUp .45s ease both;margin-bottom:24px;}
.cat-block{margin-bottom:18px;}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid rgba(45,122,58,.15);}
.cat-badge{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:3px 12px;border-radius:3px;}
.cat-badge.nat{background:rgba(168,230,61,.12);color:var(--lime);border:1px solid rgba(168,230,61,.25);}
.cat-badge.pal{background:rgba(245,200,66,.1);color:var(--amber);border:1px solid rgba(245,200,66,.25);}
.cat-badge.pro{background:rgba(212,232,194,.08);color:var(--cream);border:1px solid rgba(212,232,194,.2);}
.cat-badge.sta{background:rgba(232,52,42,.08);color:var(--red);border:1px solid rgba(232,52,42,.2);}
.cat-count{font-size:10px;color:var(--slate);font-weight:700;margin-left:auto;letter-spacing:1px;}
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:7px;}
.q-card{background:var(--pitch2);border:1.5px solid rgba(45,122,58,.15);border-radius:8px;padding:11px 13px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.q-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:transparent;transition:all .15s;}
.q-card:hover{border-color:rgba(168,230,61,.3);background:rgba(168,230,61,.04);transform:translateY(-1px);}
.q-card:hover::after{background:var(--lime);}
.q-card.on{border-color:rgba(168,230,61,.4);background:rgba(168,230,61,.07);}
.q-card.on::after{background:var(--lime);}
.q-card.on.pal{border-color:rgba(245,200,66,.4);background:rgba(245,200,66,.06);}
.q-card.on.pal::after{background:var(--amber);}
.q-card.on.pro{border-color:rgba(212,232,194,.3);background:rgba(212,232,194,.05);}
.q-card.on.pro::after{background:var(--cream);}
.q-card.on.sta{border-color:rgba(232,52,42,.4);background:rgba(232,52,42,.06);}
.q-card.on.sta::after{background:var(--red);}
.q-num{font-size:8px;font-weight:800;letter-spacing:2px;color:var(--slate);margin-bottom:4px;text-transform:uppercase;}
.q-card.on .q-num{color:var(--lime);}
.q-card.on.pal .q-num{color:var(--amber);}
.q-card.on.sta .q-num{color:var(--red);}
.q-text{font-size:12px;font-weight:700;color:rgba(240,244,232,.7);line-height:1.3;}
.q-card.on .q-text{color:var(--white);}

/* VERDICT */
.verdict-wrap{animation:fadeUp .4s ease both;}
.verdict-card{border-radius:var(--r);overflow:hidden;border:1.5px solid rgba(45,122,58,.25);box-shadow:0 12px 50px rgba(0,0,0,.4);}
.verdict-head{
  background:var(--pitch2);padding:18px 22px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  border-bottom:1px solid rgba(45,122,58,.2);position:relative;overflow:hidden;
}
.verdict-head::before{content:'VAR';position:absolute;right:-8px;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',cursive;font-size:100px;letter-spacing:6px;color:rgba(168,230,61,.04);pointer-events:none;}
.verdict-head::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--grass),var(--lime),var(--grass),transparent);}
.vh-club{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:2px;color:var(--white);display:flex;align-items:center;gap:8px;}
.vh-q{font-size:12px;font-weight:600;color:var(--slate);margin-top:2px;}
.verdict-body{background:var(--pitch);padding:22px;min-height:120px;position:relative;}
.scan-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.scan-beam{position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,transparent,var(--lime),transparent);animation:scanDown .8s ease-in-out forwards;}
.locked{display:flex;flex-direction:column;align-items:center;gap:9px;padding:14px 0;text-align:center;}
.locked-icon{font-size:32px;opacity:.5;}
.locked-t{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;color:var(--slate);}
.locked-s{font-size:12px;color:var(--slate);opacity:.7;font-weight:600;}
.rev-intro{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.rev-line{width:20px;height:2px;background:var(--lime);border-radius:2px;}
.rev-text{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--slate);}
.rev-count{background:var(--lime);color:var(--pitch);font-size:9px;font-weight:800;padding:2px 7px;border-radius:3px;margin-left:3px;}
.tags{display:flex;flex-wrap:wrap;gap:7px;}
.tag{padding:6px 13px;border-radius:5px;font-size:13px;font-weight:700;letter-spacing:.3px;animation:tagIn .3s ease both;cursor:default;display:inline-flex;align-items:center;gap:6px;}
.tag img{width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.tag-nat{background:rgba(168,230,61,.1);border:1.5px solid rgba(168,230,61,.2);color:var(--lime);}
.tag-pal{background:rgba(245,200,66,.08);border:1.5px solid rgba(245,200,66,.2);color:var(--amber);}
.tag-pro{background:rgba(212,232,194,.07);border:1.5px solid rgba(212,232,194,.15);color:var(--cream);}
.tag-sta{background:rgba(232,52,42,.08);border:1.5px solid rgba(232,52,42,.18);color:var(--red);}
.no-data-msg{font-size:12px;color:var(--slate);display:flex;align-items:center;gap:7px;font-weight:600;}

.empty{text-align:center;padding:60px 20px;animation:fadeUp .5s ease both;}
.empty-badge{width:90px;height:90px;border-radius:50%;background:rgba(45,122,58,.1);border:2px solid rgba(45,122,58,.2);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 18px;}
.empty-t{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:3px;color:var(--slate);margin-bottom:6px;}
.empty-s{font-size:13px;color:var(--slate);opacity:.6;font-weight:600;}
.footer{text-align:center;margin-top:60px;font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(107,143,114,.35);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const QUESTIONS=[
  {id:1,cat:"nat",short:"Joueurs Français",full:"Citez des joueurs Français passés par ce club."},
  {id:2,cat:"nat",short:"Joueurs Espagnols",full:"Citez des joueurs Espagnols passés par ce club."},
  {id:3,cat:"nat",short:"Joueurs Allemands",full:"Citez des joueurs Allemands passés par ce club."},
  {id:4,cat:"nat",short:"Joueurs Italiens",full:"Citez des joueurs Italiens passés par ce club."},
  {id:5,cat:"nat",short:"Joueurs Anglais",full:"Citez des joueurs Anglais passés par ce club."},
  {id:6,cat:"nat",short:"Brésiliens / Argentins",full:"Citez des joueurs Brésiliens ou Argentins passés par ce club."},
  {id:7,cat:"nat",short:"Joueurs Algériens",full:"Citez des joueurs Algériens passés par ce club."},
  {id:8,cat:"nat",short:"Joueurs Marocains",full:"Citez des joueurs Marocains passés par ce club."},
  {id:9,cat:"pal",short:"Champions du Monde",full:"Citez un maximum de Champions du Monde passés par ce club."},
  {id:10,cat:"pal",short:"Vainqueurs de l'Euro",full:"Citez un maximum de Vainqueurs de l'Euro passés par ce club."},
  {id:11,cat:"pal",short:"Vainqueurs Champions League",full:"Citez un maximum de Vainqueurs de la Champions League passés par ce club."},
  {id:12,cat:"pal",short:"Ballons d'Or / Podium",full:"Citez un maximum de Ballons d'Or (ou podium) passés par ce club."},
  {id:13,cat:"pal",short:"Vainqueurs Coupe de France",full:"Citez des joueurs ayant gagné la Coupe de France avec ce club."},
  {id:14,cat:"pal",short:"Meilleur Buteur championnat",full:"Citez des joueurs ayant fini Meilleur Buteur du championnat avec ce club."},
  {id:15,cat:"pro",short:"+50 sélections nationales",full:"Citez des joueurs ayant plus de 50 sélections nationales."},
  {id:16,cat:"pro",short:"Gardiens de but",full:"Citez des Gardiens de but passés par ce club."},
  {id:17,cat:"pro",short:"Défenseurs emblématiques",full:"Citez des Défenseurs emblématiques du club."},
  {id:18,cat:"pro",short:"Milieux de terrain",full:"Citez des Milieux de terrain célèbres du club."},
  {id:19,cat:"pro",short:"Attaquants / Buteurs",full:"Citez des Attaquants passés par ce club."},
  {id:20,cat:"pro",short:"Joueurs Gauchers",full:"Citez des joueurs Gauchers célèbres du club."},
  {id:21,cat:"sta",short:"+300 matchs",full:"Citez des joueurs avec plus de 300 matchs sous ce maillot."},
  {id:22,cat:"sta",short:"+100 buts",full:"Citez des joueurs avec plus de 100 buts pour ce club."},
  {id:23,cat:"sta",short:"+5 saisons consécutives",full:"Citez des joueurs restés plus de 5 saisons consécutives."},
  {id:24,cat:"sta",short:"Transfert > 20 M€",full:"Citez des joueurs achetés ou vendus pour plus de 20 M€."},
];
const CAT_META={
  nat:{label:"Nationalités",badgeCls:"cat-badge nat",tagCls:"tag-nat"},
  pal:{label:"Palmarès",badgeCls:"cat-badge pal",tagCls:"tag-pal"},
  pro:{label:"Profil Joueurs",badgeCls:"cat-badge pro",tagCls:"tag-pro"},
  sta:{label:"Statistiques",badgeCls:"cat-badge sta",tagCls:"tag-sta"},
};
const CATS=["nat","pal","pro","sta"];

function App(){
  const [db,setDb]=React.useState(null);
  const [loading,setLoading]=React.useState(true);
  const [error,setError]=React.useState(null);
  const [club,setClub]=React.useState(null);
  const [question,setQuestion]=React.useState(null);
  const [revealed,setRevealed]=React.useState(false);
  const [scanning,setScanning]=React.useState(false);
  const [search,setSearch]=React.useState('');
  const [dropOpen,setDropOpen]=React.useState(false);
  const dropRef=React.useRef(null);
  const inputRef=React.useRef(null);

  React.useEffect(()=>{
    fetch('./database.json')
      .then(r=>{if(!r.ok)throw new Error('database.json introuvable ('+r.status+')');return r.json();})
      .then(data=>{setDb(data);setLoading(false);})
      .catch(e=>{setError(e.message);setLoading(false);});
  },[]);

  const clubs=db?.clubs||[];
  const answers=db?.answers||{};

  const filtered=React.useMemo(()=>{
    if(!search)return clubs;
    const s=search.toLowerCase();
    return clubs.filter(c=>c.name.toLowerCase().includes(s)||(c.league||'').toLowerCase().includes(s));
  },[search,clubs]);

  const grouped=React.useMemo(()=>{
    const o={};filtered.forEach(c=>{if(!o[c.league])o[c.league]=[];o[c.league].push(c);});return o;
  },[filtered]);

  React.useEffect(()=>{
    const fn=e=>{
      if(dropRef.current&&!dropRef.current.contains(e.target)&&inputRef.current&&!inputRef.current.contains(e.target))setDropOpen(false);
    };
    document.addEventListener('mousedown',fn);return()=>document.removeEventListener('mousedown',fn);
  },[]);

  const pickClub=c=>{setClub(c);setQuestion(null);setRevealed(false);setSearch('');setDropOpen(false);};
  const pickQ=q=>{setQuestion(q);setRevealed(false);};
  const launch=()=>{setScanning(true);setTimeout(()=>{setScanning(false);setRevealed(true);},900);};
  const reset=()=>{setClub(null);setQuestion(null);setRevealed(false);setSearch('');};

  const getAns=(cid,qid)=>{
    if(!answers||!answers[cid])return null;
    const d=answers[cid];
    return d[String(qid)]!==undefined?d[String(qid)]:(d[qid]!==undefined?d[qid]:null);
  };

  const renderPlayer=(p,i,tagCls)=>{
    const name=p&&typeof p==='object'?(p.name||'?'):String(p);
    const photo=p&&typeof p==='object'?p.photo:null;
    return(
      <span key={i} className={`tag ${tagCls}`} style={{animationDelay:`${i*.04}s`}}>
        {photo&&<img src={photo} onError={e=>{e.target.style.display='none';}} alt=""/>}
        {name}
      </span>
    );
  };

  const ans=club&&question?getAns(club.id,question.id):null;
  const step=!club?1:!question?2:3;
  const qCat=question?.cat||'nat';
  const tagCls=CAT_META[qCat]?.tagCls||'tag-nat';

  if(loading)return(
    <div>
      <div className="topbar">
        <div className="brand"><span className="brand-name">VAR CLUB</span><div className="brand-pipe"/><span className="mode-label">Duel VAR</span></div>
        <div className="topbar-right"><div className="live-pill"><div className="live-dot"/>LIVE</div></div>
      </div>
      <div className="loading"><div className="spinner"/><div className="loading-text">Chargement…</div></div>
    </div>
  );

  return(
    <div>
      <div className="topbar">
        <div className="brand"><span className="brand-name">VAR CLUB</span><div className="brand-pipe"/><span className="mode-label">Duel VAR</span></div>
        <div className="topbar-mid">
          {club?<span className="hl">{club.flag} {club.name}</span>:<span>Sélectionnez un club</span>}
          {question&&<><span>·</span><span>{question.short}</span></>}
        </div>
        <div className="topbar-right"><div className="live-pill"><div className="live-dot"/>LIVE</div></div>
      </div>

      <div className="page">
        {error&&<div className="error-banner">⚠️ {error}</div>}

        <div className="stepbar">
          {[['①','Club',1],['②','Question',2],['③','Verdict',3]].map(([n,label,val])=>(
            <div key={val} className={`step-item${step===val?' on':''}${step>val?' done':''}`}>
              <div className="step-num">{step>val?'✓':n}</div>
              <span>{label}</span>
            </div>
          ))}
          {(club||question)&&<div className="step-reset"><button className="reset-btn" onClick={reset}>↺ Recommencer</button></div>}
        </div>

        <div className="two-col">
          <div>
            <div className="sh"><span className="sh-num">①</span><span className="sh-label">Choisir un club</span></div>
            <div className="picker-box">
              <div className="picker-inner">
                <div className="search-wrap" style={{position:'relative'}}>
                  <span className="search-ico">🔍</span>
                  <input ref={inputRef} className="search-inp" placeholder="Rechercher club ou championnat…"
                    value={search} onChange={e=>{setSearch(e.target.value);setDropOpen(true);}} onFocus={()=>setDropOpen(true)}/>
                  {dropOpen&&(
                    <div className="dropdown" ref={dropRef}>
                      {Object.entries(grouped).map(([league,cls])=>(
                        <div key={league}>
                          <div className="dg-label">{league}</div>
                          {cls.map(c=>(
                            <div key={c.id} className={`di${club?.id===c.id?' sel':''}`} onMouseDown={()=>pickClub(c)}>
                              <span style={{fontSize:'15px'}}>{c.flag}</span><span>{c.name}</span>
                              {answers[c.id]?<span className="has-data">✓ données</span>:<span className="no-data">à compléter</span>}
                            </div>
                          ))}
                        </div>
                      ))}
                      {!Object.keys(grouped).length&&<div style={{padding:'14px',color:'var(--slate)',fontSize:'12px',textAlign:'center'}}>Aucun résultat</div>}
                    </div>
                  )}
                </div>
                {club&&(
                  <div className="club-chip">
                    <span className="chip-flag">{club.flag}</span>
                    <div className="chip-info">
                      <div className="chip-name">{club.name}</div>
                      <div className="chip-league">{club.league}{answers[club.id]?<span style={{color:'var(--lime)',marginLeft:'8px',fontSize:'9px',fontWeight:800}}>✓ BASE COMPLÈTE</span>:<span style={{color:'var(--red)',marginLeft:'8px',fontSize:'9px',fontWeight:700}}>· à compléter</span>}</div>
                    </div>
                    <span className="chip-x" onClick={()=>{setClub(null);setRevealed(false);}}>×</span>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div>
            <div className="sh"><span className="sh-num">③</span><span className="sh-label">Verdict VAR</span></div>
            <div className="status-box">
              {!club&&<div className="status-idle">Sélectionnez un club puis une question.<br/><br/>Annoncez votre réponse à voix haute — puis <strong style={{color:'var(--lime)'}}>lancez la VAR</strong>.</div>}
              {club&&!question&&(
                <div style={{animation:'fadeUp .25s ease both'}}>
                  <div style={{fontSize:'9px',fontWeight:800,letterSpacing:'2px',textTransform:'uppercase',color:'var(--slate)',marginBottom:'5px'}}>Club sélectionné</div>
                  <div className="status-club-name">{club.flag} {club.name}</div>
                  <div style={{fontSize:'12px',color:'var(--lime)',fontWeight:700,marginTop:'7px',letterSpacing:'.5px'}}>→ Choisissez une question ci-dessous</div>
                </div>
              )}
              {club&&question&&(
                <div style={{animation:'fadeUp .25s ease both'}}>
                  <div style={{fontSize:'9px',fontWeight:800,letterSpacing:'2px',textTransform:'uppercase',color:'var(--slate)',marginBottom:'4px'}}>Prêt pour le verdict</div>
                  <div className="status-club-name">{club.flag} {club.name}</div>
                  <div className="status-q-text">Q{question.id} — {question.short}</div>
                  {!revealed&&!scanning&&<button className="btn-launch" onClick={launch}>▶ LANCER LA VAR</button>}
                  {scanning&&<button className="btn-launch" disabled>⏳ ANALYSE…</button>}
                  {revealed&&(
                    <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                      <button className="btn-ghost" onClick={()=>setRevealed(false)}>↺ Masquer</button>
                      <button className="btn-ghost" onClick={()=>{setQuestion(null);setRevealed(false);}}>→ Nouvelle question</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>

        <div className="q-section">
          <div className="sh"><span className="sh-num">②</span><span className="sh-label">Choisir une question</span></div>
          {CATS.map(cat=>{
            const meta=CAT_META[cat];
            const qs=QUESTIONS.filter(q=>q.cat===cat);
            return(
              <div key={cat} className="cat-block">
                <div className="cat-header">
                  <span className={meta.badgeCls}>{meta.label}</span>
                  <span className="cat-count">{qs.length} questions</span>
                </div>
                <div className="q-grid">
                  {qs.map(q=>(
                    <div key={q.id} className={`q-card${question?.id===q.id?` on ${cat}`:''}`} onClick={()=>pickQ(q)}>
                      <div className="q-num">Q{q.id}</div>
                      <div className="q-text">{q.short}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        {club&&question?(
          <div className="verdict-wrap">
            <div className="sh"><span className="sh-num">③</span><span className="sh-label">Verdict VAR</span></div>
            <div className="verdict-card">
              <div className="verdict-head">
                <div>
                  <div className="vh-club">{club.flag} {club.name}</div>
                  <div className="vh-q">{question.full}</div>
                </div>
                <div>
                  {!revealed&&!scanning&&<button className="btn-launch" onClick={launch}>▶ LANCER LA VAR</button>}
                  {scanning&&<button className="btn-launch" disabled>⏳ ANALYSE…</button>}
                  {revealed&&<button className="btn-ghost" onClick={()=>setRevealed(false)}>↺ Masquer</button>}
                </div>
              </div>
              <div className="verdict-body">
                {scanning&&<div className="scan-wrap"><div className="scan-beam"/></div>}
                {!revealed&&!scanning&&(
                  <div className="locked">
                    <div className="locked-icon">🔒</div>
                    <div className="locked-t">Annoncez votre réponse à voix haute</div>
                    <div className="locked-s">Puis cliquez sur "Lancer la VAR" pour le verdict</div>
                  </div>
                )}
                {revealed&&(
                  <div style={{animation:'fadeUp .35s ease both'}}>
                    {ans===null?(
                      <div className="no-data-msg">⚠️ Données non renseignées pour <strong>{club.name}</strong></div>
                    ):!Array.isArray(ans)||ans.length===0?(
                      <div className="no-data-msg">Aucun joueur référencé pour cette combinaison.</div>
                    ):(
                      <>
                        <div className="rev-intro">
                          <div className="rev-line"/>
                          <span className="rev-text">Réponses de référence</span>
                          <span className="rev-count">{ans.length}</span>
                        </div>
                        <div className="tags">
                          {ans.map((p,i)=>renderPlayer(p,i,tagCls))}
                        </div>
                      </>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        ):(
          <div className="empty">
            <div className="empty-badge">⚽</div>
            <div className="empty-t">La VAR est prête</div>
            <div className="empty-s">Sélectionnez un club et une question pour démarrer</div>
          </div>
        )}

        <div className="footer">© VAR Club · Duel VAR · {clubs.length} clubs · {Object.keys(answers).length} bases complètes</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
